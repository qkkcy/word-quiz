<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>오늘의 영단어</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .count {
    font-size: 13px;
    color: #6b6a64;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    background: #fff;
    border: 1px solid #d8d6cd;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    color: #1a1a18;
  }
  button:active { background: #ececE6; }
  .primary {
    background: #1a1a18;
    color: #fff;
    border: none;
    width: 100%;
    padding: 14px;
    font-size: 15px;
    border-radius: 10px;
    margin-top: 16px;
  }
  .card {
    background: #fff;
    border: 1px solid #e3e1d8;
    border-radius: 16px;
    padding: 40px 20px;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .word { font-size: 26px; font-weight: 600; margin: 0 0 10px; }
  .meaning { font-size: 16px; color: #4f4e48; margin: 0; display: none; line-height: 1.5; }
  .hint { font-size: 12px; color: #9a988f; margin-top: 16px; }
  .view { display: none; }
  .view.active { display: block; }
  textarea, input[type=text] {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #d8d6cd;
    background: #fff;
    color: #1a1a18;
    margin-bottom: 8px;
  }
  textarea { resize: vertical; }
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tabs button { flex: 1; }
  .tabs button.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .list-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #e3e1d8;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    background: #fff;
  }
  .list-row .w { font-weight: 600; font-size: 14px; }
  .list-row .m { font-size: 13px; color: #6b6a64; margin-left: 8px; }
  .list-row .del {
    border: none;
    background: none;
    color: #b94a3a;
    font-size: 13px;
    padding: 4px 8px;
  }
  .result { font-size: 12px; color: #6b6a64; margin: 4px 0 14px; }
  h2 { font-size: 16px; margin: 0 0 14px; }
</style>
</head>
<body>
<div class="wrap">

  <div id="quizView" class="view active">
    <div class="topbar">
      <span class="count" id="countLabel">단어 0개</span>
      <button id="manageBtn">단어 관리</button>
    </div>
    <div class="card" id="card">
      <p class="word" id="cardWord">-</p>
      <p class="meaning" id="cardMeaning">-</p>
      <p class="hint" id="cardHint">탭해서 뜻 보기</p>
    </div>
    <button class="primary" id="nextBtn">다음 단어</button>
  </div>

  <div id="manageView" class="view">
    <div class="topbar">
      <h2>단어 관리</h2>
      <button id="backBtn">퀴즈로</button>
    </div>
    <div class="tabs">
      <button id="tabSingle" class="active">한 개씩 추가</button>
      <button id="tabBulk">한꺼번에 추가</button>
    </div>
    <div id="singleAdd">
      <input id="wordInput" type="text" placeholder="단어 (예: abandon)" />
      <input id="meaningInput" type="text" placeholder="뜻 (예: 버리다, 포기하다)" />
      <button class="primary" id="addBtn">추가</button>
    </div>
    <div id="bulkAdd" style="display:none;">
      <p class="hint" style="margin:0 0 6px;">한 줄에 "단어 : 뜻" 형식으로 붙여넣으세요.</p>
      <textarea id="bulkInput" rows="6" placeholder="abandon : 버리다, 포기하다"></textarea>
      <button class="primary" id="bulkAddBtn">일괄 추가</button>
      <p class="result" id="bulkResult"></p>
    </div>
    <div id="wordList" style="margin-top:18px;"></div>
  </div>

</div>

<script>

["begrudgingly","마지못해"],["at face value","액면가"],["paramount","the most important"],

["innuendo","(넌지시, 특히 성적, 비판적) 빈정거림"],["meander","거닐다"],

["austerity","내핍, 금욕적인"],["incongruous","어울리지 않은, 이상한"],

["capacious","널찍한"],["discreetly","조심스럽게"],["reverently","경건하게, 공손하게"],

["come to a head","결정적인 국면에 도달하다"],["inadvertently","무심코"],
["clock up (over ~)","누적하다, 기록하다"],["unprecedented","전례없는"],

["brute","짐승, 야수"],["merciless imitation","신랄한 묘사"],["attentive","세심한"],
["gain facility","~에 능숙해지다"],["mid air","공중에서"],
["contextualize","맥락속에서 설명하다"],["orient","방향을 맞추다"],["implacably","가차없이"],

["commence","(격식) 시작하다, 개시하다"],["nuzzle","(애정표현) 코나 얼굴을 비비다"],
["strife","심한 다툼"],["perch","앉는 곳, 나뭇가지 / (새가) 앉다, (톡) 앉다"],
["decipher","해독하다"],["roost down","(새가) 잠자리를 잡다, 자리를 잡고 눌러 앉다"],
["warm to it","서서히 호감이 생기다"],["overlook","전망대"],
["blanket","뒤덮다, 퍼지다, 전면적으로 적용하다"],["flora","식물군, 식생"],
["rakish","멋지고 자신감 있는 (나쁜남자st), 장난스럽고 매력적인"],["relic","유물, 유적"],
["venture","~에 발을 들이다"],["deprive","박탈하다, ~을 못하게 하다"],
["perpendicular","수직의, 직각방향의"],["cruise","천천히 이동하다"],
["parlor","응접실, 손님방, 특정서비스를 제공하는 가게"],["snappy","재치있고, 활기한 / 신속한"],
["wither","시들다, 말라죽다"],["substantially","대폭"],["maraud","(약탈하러) 돌아다니다"],
["keel over","갑자기 쓰러지다"],["convivial","화기애애한, 사교적인"],
["bleat on","계속 울다, 지루하게 불평이나 의견을 늘어놓다"],["indubitably","의심할 여지 없이"],
["perversely","아이러니하게도"],["repair to","(옛스러운표현) ~에 모이다"],
["ain't that a kick","기가 막히네, 웃기네"],["behest","명령, 지시"],["incidental","부수적인"],
["scrupulous","매우 양심적인"],["term","~을 ~라고 부르다, 명명하다"],
["valiantly","(소설적인 숭고한 행동 묘사) 용감하게"],["seclude","격리하다"],
["plaque","명판, 기념판"],["rafter","서까래, (복수) 천장들보"],["down","떨어뜨리다, 먹어치우다"],
["average","평균적으로 ~이다"],["outstrip","(학술, 뉴스) 앞지르다, 능가하다"],
["stately","(공식적) 위엄있는, 장엄한"],["languidly","나른하게, 느릿하게"]
];

function loadWords() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { return JSON.parse(raw); } catch (e) {}
  }
  var initial = DEFAULT_WORDS.map(function(p){ return { word: p[0], meaning: p[1] }; });
  saveWords(initial);
  return initial;
}

function saveWords(words) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
}

var words = loadWords();
var revealed = false;

function renderCount() {
  document.getElementById('countLabel').textContent = '단어 ' + words.length + '개 누적';
}

function pickRandom() {
  revealed = false;
  var meaningEl = document.getElementById('cardMeaning');
  var hintEl = document.getElementById('cardHint');
  if (words.length === 0) {
    document.getElementById('cardWord').textContent = '단어를 추가해주세요';
    meaningEl.style.display = 'none';
    hintEl.textContent = '아래 단어 관리에서 추가';
    return;
  }
  var idx = Math.floor(Math.random() * words.length);
  document.getElementById('cardWord').textContent = words[idx].word;
  meaningEl.textContent = words[idx].meaning;
  meaningEl.style.display = 'none';
  hintEl.textContent = '탭해서 뜻 보기';
}

function toggleReveal() {
  if (words.length === 0) return;
  revealed = !revealed;
  document.getElementById('cardMeaning').style.display = revealed ? 'block' : 'none';
  document.getElementById('cardHint').textContent = revealed ? '탭하면 다시 가려져요' : '탭해서 뜻 보기';
}

function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderList() {
  var list = document.getElementById('wordList');
  list.innerHTML = '';
  if (words.length === 0) {
    list.innerHTML = '<p class="hint">아직 추가된 단어가 없어요.</p>';
    return;
  }
  for (var revIdx = 0; revIdx < words.length; revIdx++) {
    var idx = words.length - 1 - revIdx;
    var w = words[idx];
    var row = document.createElement('div');
    row.className = 'list-row';
    var textDiv = document.createElement('div');
    textDiv.innerHTML = '<span class="w">' + escapeHtml(w.word) + '</span><span class="m">' + escapeHtml(w.meaning) + '</span>';
    var delBtn = document.createElement('button');
    delBtn.className = 'del';
    delBtn.textContent = '삭제';
    delBtn.addEventListener('click', (function(i){
      return function() {
        words.splice(i, 1);
        saveWords(words);
        renderCount();
        renderList();
        pickRandom();
      };
    })(idx));
    row.appendChild(textDiv);
    row.appendChild(delBtn);
    list.appendChild(row);
  }
}

document.getElementById('card').addEventListener('click', toggleReveal);
document.getElementById('nextBtn').addEventListener('click', pickRandom);

document.getElementById('manageBtn').addEventListener('click', function() {
  document.getElementById('quizView').classList.remove('active');
  document.getElementById('manageView').classList.add('active');
});
document.getElementById('backBtn').addEventListener('click', function() {
  document.getElementById('manageView').classList.remove('active');
  document.getElementById('quizView').classList.add('active');
  pickRandom();
});

document.getElementById('tabSingle').addEventListener('click', function() {
  document.getElementById('singleAdd').style.display = 'block';
  document.getElementById('bulkAdd').style.display = 'none';
  this.classList.add('active');
  document.getElementById('tabBulk').classList.remove('active');
});
document.getElementById('tabBulk').addEventListener('click', function() {
  document.getElementById('singleAdd').style.display = 'none';
  document.getElementById('bulkAdd').style.display = 'block';
  this.classList.add('active');
  document.getElementById('tabSingle').classList.remove('active');
});

document.getElementById('addBtn').addEventListener('click', function() {
  var wEl = document.getElementById('wordInput');
  var mEl = document.getElementById('meaningInput');
  var w = wEl.value.trim();
  var m = mEl.value.trim();
  if (!w || !m) return;
  words.push({ word: w, meaning: m });
  saveWords(words);
  wEl.value = '';
  mEl.value = '';
  renderCount();
  renderList();
});

document.getElementById('bulkAddBtn').addEventListener('click', function() {
  var textEl = document.getElementById('bulkInput');
  var lines = textEl.value.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });
  var added = 0, skipped = 0;
  lines.forEach(function(line) {
    var sep = line.indexOf(':') !== -1 ? ':' : (line.indexOf('-') !== -1 ? '-' : null);
    if (!sep) { skipped++; return; }
    var idx2 = line.indexOf(sep);
    var w = line.slice(0, idx2).trim();
    var m = line.slice(idx2 + 1).trim();
    if (!w || !m) { skipped++; return; }
    words.push({ word: w, meaning: m });
    added++;
  });
  saveWords(words);
  textEl.value = '';
  renderCount();
  renderList();
  document.getElementById('bulkResult').textContent = added + '개 추가됨' + (skipped > 0 ? ', ' + skipped + '개 형식 오류로 건너뜀' : '');
});

renderCount();
renderList();
pickRandom();
</script>
</body>
</html>
